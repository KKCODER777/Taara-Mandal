name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.36

      - name: Install Android SDK build-tools
        run: |
          buildozer android debug || true
          SDKMANAGER="$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER "build-tools;33.0.2" "platforms;android-33" "platform-tools" || true

      - name: Build APK
        run: |
          buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: taara-mandal-apk
          path: bin/*.apk
