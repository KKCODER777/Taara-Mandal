name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake

      - name: Install Buildozer and Cython
        run: |
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Setup Android SDK manually
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_ROOT

          # Download cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d cmdtools_tmp

          # Put in the exact path Buildozer expects
          mkdir -p $SDK_ROOT/tools/bin
          mkdir -p $SDK_ROOT/cmdline-tools/latest
          cp -r cmdtools_tmp/cmdline-tools/* $SDK_ROOT/cmdline-tools/latest/

          # Create symlink so Buildozer finds sdkmanager in tools/bin
          ln -sf $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
          ln -sf $SDK_ROOT/cmdline-tools/latest/bin/avdmanager $SDK_ROOT/tools/bin/avdmanager

          export PATH=$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/tools/bin:$PATH

          # Accept licenses
          yes | sdkmanager --sdk_root=$SDK_ROOT --licenses || true

          # Install required SDK components
          sdkmanager --sdk_root=$SDK_ROOT \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools"

          # Install NDK
          sdkmanager --sdk_root=$SDK_ROOT "ndk;25.2.9519653"

          echo "SDK setup complete"
          ls $SDK_ROOT/build-tools/

      - name: Build APK
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$SDK_ROOT
          export ANDROID_NDK_ROOT=$SDK_ROOT/ndk/25.2.9519653
          export PATH=$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/tools/bin:$SDK_ROOT/platform-tools:$PATH
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: taara-mandal-apk
          path: bin/*.apk
